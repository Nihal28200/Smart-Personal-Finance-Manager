{% extends 'base.html' %}
{% block content %}

<div class="container d-flex align-items-center justify-content-center min-vh-100" 
     style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    
    <div class="card shadow-lg border-0 rounded-4 text-center p-5" style="max-width: 500px; width: 100%;">
        
        <div class="mb-4">
            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-4">
                <i class="fas fa-globe-americas fa-3x"></i>
            </div>
        </div>

        <h2 class="fw-bold text-dark mb-2">Select Your Currency</h2>
        <p class="text-muted mb-4">Choose your preferred currency to track expenses accurately.</p>

        <form method="post">
            {% csrf_token %}
            
            <div class="text-start mb-4">
                <label class="fw-bold text-muted small ms-1 mb-2">CURRENCY</label>
                {{ form.currency }}
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm transition-hover">
                Get Started <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

    </div>
</div>

{% endblock %}
