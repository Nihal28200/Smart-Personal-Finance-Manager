{% extends 'base.html' %}

{% block content %}

<div class="d-flex align-items-center justify-content-center min-vh-100 py-5" 
     style="background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    
                    <div class="card-header border-0 text-center py-4" 
                         style="background: linear-gradient(to right, #667eea, #764ba2);">
                        <div class="bg-white bg-opacity-25 rounded-circle d-inline-flex p-3 mb-2 text-white">
                            <i class="fas fa-receipt fa-2x"></i>
                        </div>
                        <h4 class="fw-bold text-white mb-0">Add Expense</h4>
                        <p class="text-white-50 small mb-0">AI Auto-Scan & Voice Enabled ⚡</p>
                    </div>

                    <div class="card-body p-4 p-md-5 bg-white">
                        
                        <div class="text-center mb-4 position-relative">
                            <p class="text-muted small mb-2 fw-bold text-uppercase ls-1">Tap mic and say "Food 500"</p>
                            <button type="button" onclick="startVoice()" class="btn btn-outline-danger rounded-circle p-3 shadow-sm hover-scale position-relative" style="width: 60px; height: 60px;">
                                <i class="fas fa-microphone fa-lg"></i>
                                <span id="listeningIndicator" class="position-absolute top-0 start-100 translate-middle p-2 bg-success border border-light rounded-circle d-none">
                                    <span class="visually-hidden">Listening...</span>
                                </span>
                            </button>
                        </div>

                        <form method="post" enctype="multipart/form-data" id="expenseForm">
                            {% csrf_token %}

                            <div class="mb-4">
                                <label class="form-label text-uppercase small fw-bold text-muted ls-1">
                                    Receipt Photo <span class="text-primary">(AI Active)</span>
                                </label>
                                
                                <div id="scanBox" class="p-3 border-2 border-dashed rounded-3 text-center bg-light position-relative hover-effect">
                                    <i id="scanIcon" class="fas fa-camera text-muted mb-2 fa-lg"></i>
                                    <p id="scanText" class="small text-muted mb-0">Click to Upload Receipt</p>
                                    
                                    <div class="opacity-0 position-absolute top-0 start-0 w-100 h-100">
                                        <input type="file" name="receipt_image" id="receipt_input" class="w-100 h-100" style="cursor: pointer;" onchange="handleFileSelect(this)">
                                    </div>
                                </div>
                                
                                <div class="text-center mt-2">
                                    <small class="text-primary fw-bold fst-italic" id="statusMsg">
                                        <i class="fas fa-magic me-1"></i> Details will auto-fill after upload!
                                    </small>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-uppercase small fw-bold text-muted ls-1">Category</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0 text-primary rounded-start-pill ps-3">
                                        <i class="fas fa-tag"></i>
                                    </span>
                                    {{ form.category }} 
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-uppercase small fw-bold text-muted ls-1">Amount</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0 text-success rounded-start-pill ps-3">
                                        <i class="fas fa-dollar-sign"></i>
                                    </span>
                                    <input type="number" name="amount" step="0.01" class="form-control" id="id_amount" placeholder="0.00" value="{{ form.amount.value|default:'' }}">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-uppercase small fw-bold text-muted ls-1">Date</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0 text-warning rounded-start-pill ps-3">
                                        <i class="fas fa-calendar-alt"></i>
                                    </span>
                                    <input type="date" name="expense_date" class="form-control" id="id_expense_date" value="{{ form.expense_date.value|default:'' }}">
                                </div>
                            </div>

                            <div class="d-grid gap-3 mt-5">
                                <button type="submit" class="btn btn-primary py-3 rounded-pill fw-bold shadow hover-scale">
                                    <i class="fas fa-save me-2"></i> SAVE EXPENSE
                                </button>
                                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary py-2 rounded-pill fw-bold border-0 text-center">
                                    Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. HANDLE FILE SELECTION (TRIGGER BACKEND SCAN) ---
    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            const scanText = document.getElementById('scanText');
            const scanIcon = document.getElementById('scanIcon');
            const scanBox = document.getElementById('scanBox');
            const statusMsg = document.getElementById('statusMsg');

            // UI Feedback
            scanText.innerHTML = "Processing Receipt... <span class='spinner-border spinner-border-sm text-primary'></span>";
            scanIcon.className = "fas fa-receipt text-primary mb-2 fa-lg fa-spin"; 
            scanBox.style.backgroundColor = "#eef2ff";

            // Submit form to trigger the backend OCR logic in views.py
            // This ensures the page reloads with scanned_data filled
            document.getElementById('expenseForm').submit();
        }
    }

    // --- 2. VOICE COMMAND LOGIC ---
    function startVoice() {
        if (!('webkitSpeechRecognition' in window)) {
            alert("Voice not supported in this browser. Try Chrome!");
            return;
        }

        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        const indicator = document.getElementById('listeningIndicator');
        
        recognition.onstart = function() { indicator.classList.remove('d-none'); };
        recognition.onend = function() { indicator.classList.add('d-none'); };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            const words = transcript.trim().split(" ");
            
            let amount = words[words.length - 1];
            let category = words.slice(0, words.length - 1).join(" ");

            const amountField = document.getElementById('id_amount');
            const categoryField = document.querySelector('select[name="category"]');

            if (!isNaN(amount)) {
                if(amountField) amountField.value = amount;
                if(categoryField) {
                    for (let i = 0; i < categoryField.options.length; i++) {
                        if (categoryField.options[i].text.toLowerCase().includes(category.toLowerCase())) {
                            categoryField.selectedIndex = i;
                            break;
                        }
                    }
                }
            }
        };
        recognition.start();
    }
</script>

<style>
    .ls-1 { letter-spacing: 1px; font-size: 0.75rem; }
    .input-group .form-control {
        border: none; background-color: #f8f9fa !important; padding: 12px;
        border-radius: 0 50px 50px 0 !important; font-weight: 500;
    }
    .input-group-text { border-radius: 50px 0 0 50px !important; }
    .form-control:focus { background-color: #fff !important; box-shadow: 0 4px 15px rgba(0,0,0,0.05); outline: none; }
    .border-dashed { border-style: dashed !important; border-color: #cbd5e1 !important; transition: all 0.3s; }
    .hover-effect:hover { background-color: #eef2ff !important; border-color: #667eea !important; }
    .hover-scale:hover { transform: translateY(-2px); transition: 0.2s; }
</style>

{% endblock %}
