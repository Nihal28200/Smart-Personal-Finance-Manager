{% extends 'base.html' %}
{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Notifications</h2>
        <span class="badge bg-primary rounded-pill px-3 py-2 shadow-sm">{{ notifications.count }} Total</span>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            {% for n in notifications %}
            <div class="card border-0 shadow-sm rounded-4 mb-3 border-start border-4 border-primary">
                <div class="card-body p-3">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-3 p-3 me-3">
                            <i class="fas {% if 'Alert' in n.message %}fa-exclamation-triangle text-danger{% else %}fa-info-circle{% endif %} fa-lg"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-center">
                                <h6 class="fw-bold mb-1 text-dark">System Alert</h6>
                                <small class="text-muted small">{{ n.created_at|timesince }} ago</small>
                            </div>
                            <p class="mb-0 text-secondary small">{{ n.message }}</p>
                        </div>
                        <div class="ms-3">
                            <a href="{% url 'delete_notification' n.id %}" class="btn btn-sm btn-light rounded-circle text-danger">
                                <i class="fas fa-trash-alt"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="text-center py-5">
                <i class="fas fa-bell-slash fa-3x text-muted mb-3 opacity-50"></i>
                <h5 class="text-dark">All caught up!</h5>
                <p class="text-muted small">No new notifications.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
