{% extends 'base.html' %}
{% block content %}
<div class="container py-5 text-center d-flex flex-column justify-content-center align-items-center" style="min-height: 60vh;">
    
    <div class="bg-light rounded-circle p-4 mb-4 shadow-sm">
        <i class="fas fa-tools fa-3x text-secondary"></i>
    </div>

    <h2 class="fw-bold mb-3">{{ feature_name }}</h2>
    
    <p class="text-muted lead mb-4" style="max-width: 500px;">
        {{ message }}<br>
        <span class="small text-primary">This feature is coming in version 2.0 🚀</span>
    </p>

    <a href="{% url 'dashboard' %}" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm hover-scale">
        <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
    </a>
</div>

<style>
    .hover-scale:hover { transform: translateY(-2px); transition: 0.2s; }
</style>
{% endblock %}
