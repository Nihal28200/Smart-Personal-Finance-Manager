{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
                    <h4 class="fw-bold mb-0"><i class="fas fa-edit me-2"></i>Edit Expense</h4>
                </div>
                <div class="card-body p-5">
                    
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {% if form.errors %}
                            <div class="alert alert-danger">
                                Please fix the errors below.
                            </div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small">Category</label>
                            {{ form.category }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small">Amount</label>
                            {{ form.amount }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small">Date</label>
                            {{ form.expense_date }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small">Receipt Image (Optional)</label>
                            {{ form.receipt_image }}
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2 fw-bold rounded-pill shadow-sm">
                                Update Expense
                            </button>
                            <a href="{% url 'dashboard' %}" class="btn btn-light text-muted fw-bold rounded-pill">
                                Cancel
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
