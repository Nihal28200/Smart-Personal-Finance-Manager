{% extends 'base.html' %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100" style="background-color: #f8f9fa;">
    <div class="card shadow border-0 rounded-4" style="max-width: 400px; width: 100%;">
        <div class="card-body text-center p-5">
            <div class="mb-4 text-danger">
                <i class="fas fa-trash-alt fa-4x"></i>
            </div>
            
            <h3 class="fw-bold mb-3">Are you sure?</h3>
            <p class="text-muted mb-4">
                You are about to delete:<br>
                <span class="fw-bold text-dark">{{ expense.category }}</span> - 
                <span class="fw-bold text-dark">{{ currency_symbol }} {{ expense.amount }}</span>
            </p>
            
            <form method="post" action="{% url 'delete_expense' expense.id %}">
                {% csrf_token %}
                
                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-danger py-2 fw-bold shadow-sm">
                        Yes, Delete It
                    </button>
                    
                    <a href="{% url 'dashboard' %}" class="btn btn-light py-2 fw-bold text-muted border">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
