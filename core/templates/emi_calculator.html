{% extends 'base.html' %}
{% block content %}
<div class="container py-5" style="max-width: 600px;">
    <div class="card border-0 shadow-lg rounded-4">
        <div class="card-header bg-primary text-white p-4 rounded-top-4">
            <h3 class="fw-bold mb-0"><i class="fas fa-calculator me-2"></i> EMI Calculator</h3>
            <p class="mb-0 text-white-50">Calculate your Loan Installments easily</p>
        </div>
        <div class="card-body p-4">
            <form id="emiForm">
                <div class="mb-3">
                    <label class="fw-bold text-muted small">Loan Amount (₹)</label>
                    <input type="number" id="amount" class="form-control form-control-lg" placeholder="e.g. 500000">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold text-muted small">Interest Rate (%)</label>
                        <input type="number" id="rate" class="form-control form-control-lg" placeholder="e.g. 8.5">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="fw-bold text-muted small">Tenure (Years)</label>
                        <input type="number" id="years" class="form-control form-control-lg" placeholder="e.g. 5">
                    </div>
                </div>
                <button type="button" onclick="calculateEMI()" class="btn btn-dark w-100 rounded-pill py-3 fw-bold mt-2">
                    Calculate EMI
                </button>
            </form>

            <div id="resultBox" class="mt-4 p-4 bg-light rounded-3 text-center d-none">
                <p class="text-muted small mb-1">Your Monthly EMI</p>
                <h1 class="fw-bold text-primary mb-0">₹ <span id="emiValue">0</span></h1>
                <small class="text-muted">Total Interest: ₹ <span id="totalInterest">0</span></small>
            </div>
        </div>
    </div>
</div>

<script>
    function calculateEMI() {
        let P = document.getElementById('amount').value;
        let r = document.getElementById('rate').value;
        let n = document.getElementById('years').value;

        if(P && r && n) {
            let monthlyRate = r / 12 / 100;
            let months = n * 12;
            
            // EMI Formula: [P x R x (1+R)^N]/[(1+R)^N-1]
            let emi = (P * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
            let totalPayment = emi * months;
            let totalInterest = totalPayment - P;

            document.getElementById('emiValue').innerText = emi.toFixed(0);
            document.getElementById('totalInterest').innerText = totalInterest.toFixed(0);
            document.getElementById('resultBox').classList.remove('d-none');
        } else {
            alert("Please fill all details!");
        }
    }
</script>
{% endblock %}
