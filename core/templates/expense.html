{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow border-0">
            <div class="card-header bg-white border-0 py-4 px-5">
                <div class="d-flex justify-content-between align-items-center">
                    <h3 class="fw-bold mb-0 text-dark">Edit Expense Details</h3>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm rounded-pill">
                        <i class="fas fa-times me-1"></i> Cancel
                    </a>
                </div>
            </div>
            <div class="card-body p-5">
                <form action="{% url 'save_expense' expense.id %}" method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="alert alert-danger">Please correct the errors below.</div>
                    {% endif %}

                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label fw-bold text-muted">Category</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-tag text-muted"></i></span>
                                <input type="text" name="category" value="{{ expense.category }}" class="form-control form-control-lg border-start-0" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted">Amount</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-money-bill-wave text-muted"></i></span>
                                <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" class="form-control form-control-lg border-start-0" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted">Currency</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-coins text-muted"></i></span>
                                <input type="text" name="currency" value="{{ expense.currency }}" class="form-control form-control-lg border-start-0" required>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold text-muted">Date</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-calendar-alt text-muted"></i></span>
                                <input type="date" name="expense_date" value="{{ expense.expense_date|date:'Y-m-d' }}" class="form-control form-control-lg border-start-0" required>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="p-3 bg-light rounded border border-dashed">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <small class="text-muted d-block">Converted Amount</small>
                                        <span class="h5 fw-bold text-success">{{ expense.amount_in_target_currency }}</span>
                                    </div>
                                    <div class="text-end">
                                        <small class="text-muted d-block">Target Currency</small>
                                        <span class="badge bg-secondary">{{ user.userprofile.target_currency }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg flex-grow-1 rounded-pill shadow-sm">
                            <i class="fas fa-save me-2"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
