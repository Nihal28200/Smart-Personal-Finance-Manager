{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <h2 class="fw-bold mb-4">🛡️ Warranty Tracker</h2>
    
    <div class="row g-4">
        {% for w in warranties %}
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 h-100 hover-scale">
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <h5 class="fw-bold mb-0">{{ w.product_name }}</h5>
                        <i class="fas fa-shield-alt text-primary"></i>
                    </div>
                    <hr class="opacity-10">
                    <p class="small text-muted mb-1">Expires on: <b>{{ w.expiry_date }}</b></p>
                    
                    {% if w.is_expired %}
                    <span class="badge bg-danger rounded-pill">Expired</span>
                    {% else %}
                    <span class="badge bg-success-subtle text-success border-0 rounded-pill">Active: {{ w.days_left }} days left</span>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
