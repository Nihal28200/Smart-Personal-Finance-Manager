{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FinFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* 🔥 SAME ANIMATED BACKGROUND FOR CONSISTENCY */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 35px 30px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .form-control {
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background-color: #f8f9fa;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(35, 166, 213, 0.2);
            border-color: #23a6d5;
            background-color: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
        }

        .icon-container {
            width: 55px;
            height: 55px;
            background: #eef2ff;
            color: #0d6efd;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="login-card animate__animated animate__fadeInDown">
        <div class="text-center mb-4">
            <div class="icon-container mb-2 shadow-sm">
                <i class="fas fa-unlock-alt fa-2x"></i>
            </div>
            <h4 class="fw-bold text-dark mb-1">Recover Access</h4>
            <p class="text-muted small mb-0">Enter your email to receive a reset link</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted small"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3 shadow">
                Send Link <i class="fas fa-paper-plane ms-2"></i>
            </button>

            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-primary small">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>

</body>
</html>
