{% extends 'base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="card border-0 shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 20px;">
        <h3 class="fw-bold text-center mb-4 text-dark">Update Password</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2 mt-3 shadow-sm">Confirm New Password</button>
        </form>
    </div>
</div>
{% endblock %}
